<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Сторінку не знайдено | СпортUA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { justify-content:center; align-items:center; }
    .error-page { text-align:center; padding:4rem 2rem; max-width:500px; }
    .error-code { font-size:clamp(6rem,20vw,10rem); font-weight:900; line-height:1; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .error-icon { font-size:4rem; margin-bottom:1rem; }
  </style>
</head>
<body>
<div class="error-page">
  <div class="error-code">404</div>
  <div class="error-icon">&#127942;</div>
  <h1 style="margin-bottom:.75rem">Сторінку не знайдено</h1>
  <p style="margin-bottom:2rem">Схоже, ця сторінка зникла, як спортсмен зі старту. Можливо, посилання застаріло або адресу введено невірно.</p>
  <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
    <a href="/" class="btn btn-primary btn-lg"><i class="fa-solid fa-house"></i> На головну</a>
    <a href="/events" class="btn btn-outline btn-lg"><i class="fa-solid fa-trophy"></i> Переглянути заходи</a>
  </div>
</div>
</body>
</html>
