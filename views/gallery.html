<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея | СпортUA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Gallery Grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.1rem;
    }
    @media (max-width: 640px) {
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .75rem; }
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: var(--radius-sm);
      background: var(--bg-card2);
      cursor: zoom-in;
      border: 1px solid var(--border);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .gallery-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,.45);
      border-color: var(--text-muted);
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .45s ease;
    }
    .gallery-item:hover img { transform: scale(1.07); }

    .gallery-item-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 55%);
      opacity: 0;
      transition: opacity .3s;
      display: flex; align-items: flex-end; padding: .875rem;
    }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }
    .gallery-item-info { color: #fff; font-size: .8rem; line-height: 1.4; }
    .gallery-item-info .ev-title { font-weight: 700; margin-bottom: .15rem; }

    /* zoom badge */
    .gallery-item-zoom {
      position: absolute; top: .6rem; right: .6rem;
      width: 30px; height: 30px;
      background: rgba(0,0,0,.55);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .75rem;
      opacity: 0; transition: opacity .25s;
    }
    .gallery-item:hover .gallery-item-zoom { opacity: 1; }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.94);
      z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1rem;
    }

    /* Top bar */
    .lightbox-topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 1rem;
      background: linear-gradient(to bottom, rgba(0,0,0,.7), transparent);
    }

    .lightbox-title {
      color: #fff; font-size: .875rem; opacity: .85;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 50%;
    }

    .lightbox-controls {
      display: flex; align-items: center; gap: .5rem;
    }

    .lb-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      width: 38px; height: 38px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
      transition: background .2s;
    }
    .lb-btn:hover { background: rgba(255,255,255,.25); }
    .lb-btn:disabled { opacity: .35; cursor: not-allowed; }

    .lb-zoom-level {
      color: rgba(255,255,255,.7);
      font-size: .8rem;
      min-width: 44px;
      text-align: center;
    }

    /* Image wrapper */
    .lightbox-img-wrap {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      width: 100%; overflow: hidden;
      cursor: grab;
    }
    .lightbox-img-wrap.dragging { cursor: grabbing; }

    #lightboxImg {
      max-width: 90vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
      transform-origin: center center;
      transition: transform .18s ease;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Bottom bar */
    .lightbox-bottombar {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      gap: .75rem;
      padding: .75rem 1rem;
      background: linear-gradient(to top, rgba(0,0,0,.7), transparent);
    }

    .lb-nav-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      width: 44px; height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: background .2s;
    }
    .lb-nav-btn:hover { background: rgba(255,255,255,.28); }
    .lb-nav-btn:disabled { opacity: .3; cursor: not-allowed; }

    .lb-counter {
      color: rgba(255,255,255,.75);
      font-size: .85rem;
      min-width: 60px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="/" class="logo"><div class="logo-icon">&#9889;</div>Спорт<span>UA</span></a>
      <div class="nav-links">
        <a href="/">Головна</a><a href="/events">Заходи</a><a href="/news">Новини</a>
        <a href="/calendar">Календар</a><a href="/rankings">Рейтинг</a><a href="/gallery" class="active">Галерея</a>
      </div>
      <div class="nav-actions" id="navActions"></div>
      <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="/">Головна</a><a href="/events">Заходи</a><a href="/news">Новини</a><a href="/calendar">Календар</a><a href="/rankings">Рейтинг</a><a href="/gallery">Галерея</a>
  </div>
</nav>

<div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:2.5rem 0">
  <div class="container">
    <span class="section-label"><i class="fa-solid fa-images"></i> Медіа</span>
    <h1 style="margin:.5rem 0 .75rem">Фотогалерея</h1>
    <p>Фотозвіти з наших спортивних заходів</p>
  </div>
</div>

<main>
  <div class="section">
    <div class="container">
      <div id="galleryGrid" class="gallery-grid">
        <div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>
      </div>
      <div class="pagination" id="pagination" style="margin-top:2rem"></div>
    </div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" style="display:none">
  <!-- Top bar -->
  <div class="lightbox-topbar">
    <div class="lightbox-title" id="lightboxTitle"></div>
    <div class="lightbox-controls">
      <button class="lb-btn" id="lbZoomOut" title="Зменшити (−)"><i class="fa-solid fa-minus"></i></button>
      <span class="lb-zoom-level" id="lbZoomLevel">100%</span>
      <button class="lb-btn" id="lbZoomIn"  title="Збільшити (+)"><i class="fa-solid fa-plus"></i></button>
      <button class="lb-btn" id="lbReset"   title="Скинути масштаб"><i class="fa-solid fa-expand"></i></button>
      <button class="lb-btn" id="lbClose"   title="Закрити (Esc)"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>

  <!-- Image -->
  <div class="lightbox-img-wrap" id="lightboxWrap">
    <img id="lightboxImg" src="" alt="">
  </div>

  <!-- Bottom nav -->
  <div class="lightbox-bottombar">
    <button class="lb-nav-btn" id="lbPrev" title="Попереднє (←)"><i class="fa-solid fa-chevron-left"></i></button>
    <span class="lb-counter" id="lbCounter">1 / 1</span>
    <button class="lb-nav-btn" id="lbNext" title="Наступне (→)"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <a href="/" class="logo"><div class="logo-icon">&#9889;</div>Спорт<span>UA</span></a>
      <span>&copy; 2025 СпортUA</span>
    </div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
var currentPage = 1;
var galleryItems = [];   // [{url, title, uploader}]
var currentIndex = 0;

// ── zoom state ──────────────────────────────────────────────
var zoom = 1;
var ZOOM_MIN = 0.5, ZOOM_MAX = 4, ZOOM_STEP = 0.25;
// drag state
var drag = { active: false, startX: 0, startY: 0, tx: 0, ty: 0, ox: 0, oy: 0 };

var lbImg    = document.getElementById('lightboxImg');
var lbWrap   = document.getElementById('lightboxWrap');
var lbTitle  = document.getElementById('lightboxTitle');
var lbCounter = document.getElementById('lbCounter');
var lbZoomLvl = document.getElementById('lbZoomLevel');

function setZoom(z) {
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z));
  if (zoom === 1) { drag.tx = 0; drag.ty = 0; }
  lbImg.style.transform = 'translate(' + drag.tx + 'px,' + drag.ty + 'px) scale(' + zoom + ')';
  lbZoomLvl.textContent = Math.round(zoom * 100) + '%';
  document.getElementById('lbZoomOut').disabled = zoom <= ZOOM_MIN;
  document.getElementById('lbZoomIn').disabled  = zoom >= ZOOM_MAX;
  lbWrap.style.cursor = zoom > 1 ? 'grab' : 'default';
}

function openLightbox(index) {
  currentIndex = index;
  zoom = 1; drag.tx = 0; drag.ty = 0;
  var item = galleryItems[index];
  lbImg.src = item.url;
  lbTitle.textContent = item.title || '';
  lbCounter.textContent = (index + 1) + ' / ' + galleryItems.length;
  lbImg.style.transform = 'none';
  lbZoomLvl.textContent = '100%';
  document.getElementById('lbZoomOut').disabled = false;
  document.getElementById('lbZoomIn').disabled  = false;
  document.getElementById('lbPrev').disabled = index === 0;
  document.getElementById('lbNext').disabled = index === galleryItems.length - 1;
  document.getElementById('lightbox').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
  lbImg.src = '';
}

function navLightbox(dir) {
  var next = currentIndex + dir;
  if (next >= 0 && next < galleryItems.length) openLightbox(next);
}

// button wiring
document.getElementById('lbClose').onclick   = closeLightbox;
document.getElementById('lbReset').onclick   = function() { setZoom(1); };
document.getElementById('lbZoomIn').onclick  = function() { setZoom(zoom + ZOOM_STEP); };
document.getElementById('lbZoomOut').onclick = function() { setZoom(zoom - ZOOM_STEP); };
document.getElementById('lbPrev').onclick    = function() { navLightbox(-1); };
document.getElementById('lbNext').onclick    = function() { navLightbox(1); };

// close on backdrop click (not on image or controls)
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this || e.target === lbWrap) closeLightbox();
});

// keyboard
document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (lb.style.display === 'none') return;
  if (e.key === 'Escape')     closeLightbox();
  else if (e.key === 'ArrowLeft')  navLightbox(-1);
  else if (e.key === 'ArrowRight') navLightbox(1);
  else if (e.key === '+' || e.key === '=') setZoom(zoom + ZOOM_STEP);
  else if (e.key === '-')     setZoom(zoom - ZOOM_STEP);
  else if (e.key === '0')     setZoom(1);
});

// mouse wheel zoom
lbWrap.addEventListener('wheel', function(e) {
  e.preventDefault();
  setZoom(zoom + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
}, { passive: false });

// drag to pan (when zoomed > 1)
lbImg.addEventListener('mousedown', function(e) {
  if (zoom <= 1) return;
  e.preventDefault();
  drag.active = true;
  drag.startX = e.clientX; drag.startY = e.clientY;
  drag.ox = drag.tx;       drag.oy = drag.ty;
  lbWrap.classList.add('dragging');
});

document.addEventListener('mousemove', function(e) {
  if (!drag.active) return;
  drag.tx = drag.ox + (e.clientX - drag.startX);
  drag.ty = drag.oy + (e.clientY - drag.startY);
  lbImg.style.transform = 'translate(' + drag.tx + 'px,' + drag.ty + 'px) scale(' + zoom + ')';
});

document.addEventListener('mouseup', function() {
  if (drag.active) { drag.active = false; lbWrap.classList.remove('dragging'); }
});

// touch pinch-to-zoom
var touches = {};
lbWrap.addEventListener('touchstart', function(e) {
  for (var i = 0; i < e.touches.length; i++) {
    touches[e.touches[i].identifier] = { x: e.touches[i].clientX, y: e.touches[i].clientY };
  }
}, { passive: true });

lbWrap.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    var t0 = e.touches[0], t1 = e.touches[1];
    var oldT0 = touches[t0.identifier], oldT1 = touches[t1.identifier];
    if (oldT0 && oldT1) {
      var oldDist = Math.hypot(oldT0.x - oldT1.x, oldT0.y - oldT1.y);
      var newDist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
      setZoom(zoom * (newDist / oldDist));
    }
    touches[t0.identifier] = { x: t0.clientX, y: t0.clientY };
    touches[t1.identifier] = { x: t1.clientX, y: t1.clientY };
  }
}, { passive: false });

// ── Gallery loading ──────────────────────────────────────────
async function loadGallery() {
  var grid = document.getElementById('galleryGrid');
  grid.innerHTML = '<div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>';
  try {
    var data = await API.get('/gallery?page=' + currentPage + '&limit=24');
    var totalPages = data.pages || 1;
    var items = Array.isArray(data) ? data : (data.items || data.media || []);

    if (!items.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">&#128247;</div><h3>Фотографій поки немає</h3></div>';
      return;
    }

    galleryItems = items.map(function(item) {
      return {
        url: item.file_path || ('/images/uploads/' + item.file_name),
        title: item.event_title || item.title || '',
        uploader: ((item.uploader_first||'') + ' ' + (item.uploader_last||'')).trim()
      };
    });

    grid.innerHTML = galleryItems.map(function(item, idx) {
      return '<div class="gallery-item" onclick="openLightbox(' + idx + ')">' +
        '<img src="' + item.url + '" alt="' + item.title + '" loading="lazy">' +
        '<div class="gallery-item-zoom"><i class="fa-solid fa-magnifying-glass-plus"></i></div>' +
        '<div class="gallery-item-overlay">' +
          '<div class="gallery-item-info">' +
            (item.title ? '<div class="ev-title">' + item.title + '</div>' : '') +
            (item.uploader ? '<div style="opacity:.8">' + item.uploader + '</div>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    // pagination
    var pag = document.getElementById('pagination');
    pag.innerHTML = '';
    if (totalPages > 1) {
      var prevBtn = document.createElement('button');
      prevBtn.className = 'page-btn';
      prevBtn.innerHTML = '&#8249;';
      prevBtn.disabled = currentPage === 1;
      prevBtn.onclick = function() { currentPage--; loadGallery(); window.scrollTo(0,0); };
      pag.appendChild(prevBtn);

      for (var pi = 1; pi <= totalPages; pi++) {
        (function(p) {
          var btn = document.createElement(p === currentPage ? 'span' : 'button');
          btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
          if (p !== currentPage) btn.style.cursor = 'pointer';
          btn.textContent = p;
          if (p !== currentPage) btn.onclick = function() { currentPage = p; loadGallery(); window.scrollTo(0,0); };
          pag.appendChild(btn);
        })(pi);
      }

      var nextBtn = document.createElement('button');
      nextBtn.className = 'page-btn';
      nextBtn.innerHTML = '&#8250;';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.onclick = function() { currentPage++; loadGallery(); window.scrollTo(0,0); };
      pag.appendChild(nextBtn);
    }
  } catch(err) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">&#10060;</div><h3>Помилка завантаження</h3></div>';
  }
}

loadGallery();
</script>
</body>
</html>
