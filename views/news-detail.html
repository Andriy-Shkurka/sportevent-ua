<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новина | СпортUA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .article-body { line-height:1.9; color:var(--text); font-size:1.05rem; }
    .article-body p { margin-bottom:1.25rem; color:var(--text); }
    .article-body h2, .article-body h3 { margin:2rem 0 1rem; }
    .article-cover { width:100%; max-height:480px; object-fit:cover; border-radius:var(--radius); margin-bottom:2rem; }
    .article-meta { display:flex; flex-wrap:wrap; gap:1rem; align-items:center; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid var(--border); }
    .related-card { display:flex; gap:1rem; align-items:center; text-decoration:none; padding:.875rem; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); transition:var(--transition); }
    .related-card:hover { border-color:var(--primary); }
    .related-card img { width:72px; height:54px; object-fit:cover; border-radius:var(--radius-sm); flex-shrink:0; background:var(--bg-card2); }
    .related-card h4 { font-size:.875rem; font-weight:600; color:var(--text); margin:0 0 .25rem; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="/" class="logo"><div class="logo-icon">&#9889;</div>Спорт<span>UA</span></a>
      <div class="nav-links">
        <a href="/">Головна</a><a href="/events">Заходи</a><a href="/news">Новини</a>
        <a href="/calendar">Календар</a><a href="/rankings">Рейтинг</a><a href="/gallery">Галерея</a>
      </div>
      <div class="nav-actions" id="navActions"></div>
      <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="/">Головна</a><a href="/events">Заходи</a><a href="/news">Новини</a><a href="/calendar">Календар</a><a href="/rankings">Рейтинг</a><a href="/gallery">Галерея</a>
  </div>
</nav>

<main id="mainContent">
  <div class="loader" style="padding:6rem"><div class="spinner"></div></div>
</main>

<footer class="footer" style="margin-top:4rem">
  <div class="container">
    <div class="footer-bottom">
      <a href="/" class="logo"><div class="logo-icon">&#9889;</div>Спорт<span>UA</span></a>
      <span>&copy; 2025 СпортUA</span>
    </div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
async function loadArticle() {
  var slug = window.location.pathname.replace('/news/', '').replace(/\/$/, '');
  try {
    var data = await API.get('/news/' + slug);
    var article = data.article;
    var related = data.related || [];

    document.title = article.title + ' | СпортUA';

    var html = '<div class="section"><div class="container" style="max-width:900px">';
    // Breadcrumb
    html += '<div style="margin-bottom:1.5rem;font-size:.875rem;color:var(--text-muted)">';
    html += '<a href="/" style="color:var(--text-muted)">Головна</a> / <a href="/news" style="color:var(--text-muted)">Новини</a> / <span style="color:var(--text)">' + article.title + '</span>';
    html += '</div>';

    // Category & title
    html += '<div class="news-card-category" style="font-size:.85rem;margin-bottom:.75rem">' + (NEWS_CATEGORIES[article.category]||article.category) + '</div>';
    html += '<h1 style="font-size:clamp(1.5rem,4vw,2.25rem);margin-bottom:1.25rem">' + article.title + '</h1>';

    // Meta
    html += '<div class="article-meta">';
    html += '<span style="display:flex;align-items:center;gap:.4rem;font-size:.875rem;color:var(--text-muted)"><i class="fa-regular fa-calendar"></i> ' + formatDateFull(article.published_at) + '</span>';
    if (article.author_name) html += '<span style="display:flex;align-items:center;gap:.4rem;font-size:.875rem;color:var(--text-muted)"><i class="fa-regular fa-user"></i> ' + article.author_name + '</span>';
    html += '</div>';

    // Cover
    if (article.cover_image) {
      html += '<img class="article-cover" src="' + article.cover_image + '" alt="' + article.title + '">';
    }

    // Body
    html += '<div class="article-body">';
    if (article.content) {
      html += article.content.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
    } else if (article.excerpt) {
      html += '<p>' + article.excerpt + '</p>';
    }
    html += '</div>';

    // Related
    if (related.length) {
      html += '<div style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border)">';
      html += '<h3 style="margin-bottom:1.25rem">Схожі новини</h3>';
      html += '<div style="display:flex;flex-direction:column;gap:.75rem">';
      related.forEach(function(r) {
        html += '<a class="related-card" href="/news/' + r.slug + '">';
        html += '<img src="' + (r.cover_image || '') + '" alt="' + r.title + '" onerror="this.style.display=\'none\'">';
        html += '<div><h4>' + r.title + '</h4><span style="font-size:.75rem;color:var(--text-muted)">' + formatDate(r.published_at) + '</span></div>';
        html += '</a>';
      });
      html += '</div></div>';
    }

    html += '<div style="margin-top:2rem"><a href="/news" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> До всіх новин</a></div>';
    html += '</div></div>';

    document.getElementById('mainContent').innerHTML = html;
  } catch(err) {
    document.getElementById('mainContent').innerHTML = '<div class="empty-state" style="padding:6rem"><div class="empty-icon">&#10060;</div><h3>Статтю не знайдено</h3><p><a href="/news">До всіх новин</a></p></div>';
  }
}

loadArticle();
</script>
</body>
</html>
