<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календар заходів | СпортUA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--border); border-radius:var(--radius); overflow:hidden; }
    .cal-cell { background:var(--bg-card); min-height:90px; padding:.5rem; position:relative; }
    .cal-cell.other-month { background:var(--bg); opacity:.5; }
    .cal-cell.today { background:rgba(230,57,70,.06); }
    .cal-cell.today .cal-day-num { background:var(--primary); color:#fff; border-radius:50%; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; }
    .cal-day-num { font-size:.8rem; font-weight:700; color:var(--text-muted); margin-bottom:.25rem; display:inline-block; }
    .cal-header-cell { background:var(--bg-card2); padding:.65rem .5rem; text-align:center; font-size:.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; }
    .cal-event-dot { font-size:.7rem; font-weight:600; padding:.1rem .4rem; border-radius:3px; margin-bottom:2px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-decoration:none; display:block; }
    .cal-nav { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
    .cal-nav h2 { flex:1; text-align:center; font-size:1.25rem; }
    .events-list { display:flex; flex-direction:column; gap:.75rem; }
    .event-list-item { background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--primary); border-radius:var(--radius-sm); padding:1rem 1.25rem; display:flex; align-items:center; gap:1rem; text-decoration:none; transition:var(--transition); }
    .event-list-item:hover { border-color:var(--primary); }
    .event-date-box { text-align:center; min-width:48px; }
    .event-date-day { font-size:1.5rem; font-weight:900; color:var(--primary); line-height:1; }
    .event-date-mon { font-size:.7rem; font-weight:700; text-transform:uppercase; color:var(--text-muted); }
    @media(max-width:640px){ .cal-grid { display:none; } }
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<nav class="navbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="/" class="logo"><div class="logo-icon">&#9889;</div>Спорт<span>UA</span></a>
      <div class="nav-links">
        <a href="/">Головна</a><a href="/events">Заходи</a><a href="/news">Новини</a>
        <a href="/calendar">Календар</a><a href="/rankings">Рейтинг</a><a href="/gallery">Галерея</a>
      </div>
      <div class="nav-actions" id="navActions"></div>
      <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="/">Головна</a><a href="/events">Заходи</a><a href="/news">Новини</a><a href="/calendar">Календар</a><a href="/rankings">Рейтинг</a><a href="/gallery">Галерея</a>
  </div>
</nav>

<div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:2.5rem 0">
  <div class="container">
    <span class="section-label"><i class="fa-regular fa-calendar"></i> Розклад</span>
    <h1 style="margin:.5rem 0 .75rem">Календар заходів</h1>
    <p>Усі спортивні заходи на рік</p>
  </div>
</div>

<main>
  <div class="section">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 320px;gap:2rem;align-items:start" id="calLayout">
        <!-- Calendar -->
        <div>
          <div class="cal-nav">
            <button class="btn btn-outline btn-sm" onclick="prevMonth()"><i class="fa-solid fa-chevron-left"></i></button>
            <h2 id="calTitle">Завантаження...</h2>
            <button class="btn btn-outline btn-sm" onclick="nextMonth()"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
          <div class="cal-grid" id="calGrid">
            <div class="cal-header-cell">Пн</div>
            <div class="cal-header-cell">Вт</div>
            <div class="cal-header-cell">Ср</div>
            <div class="cal-header-cell">Чт</div>
            <div class="cal-header-cell">Пт</div>
            <div class="cal-header-cell">Сб</div>
            <div class="cal-header-cell">Нд</div>
          </div>
        </div>
        <!-- Sidebar -->
        <div>
          <h3 style="margin-bottom:1rem" id="listTitle">Заходи місяця</h3>
          <div id="eventsList" class="events-list">
            <div class="loader"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <a href="/" class="logo"><div class="logo-icon">&#9889;</div>Спорт<span>UA</span></a>
      <span>&copy; 2025 СпортUA</span>
    </div>
  </div>
</footer>

<script src="/js/app.js"></script>
<script>
var now = new Date();
var viewYear = now.getFullYear();
var viewMonth = now.getMonth(); // 0-indexed
var allEvents = [];

var MONTHS_UA = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

function prevMonth() { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } loadCalendar(); }
function nextMonth() { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } loadCalendar(); }

function renderCalendar(events) {
  allEvents = events;
  document.getElementById('calTitle').textContent = MONTHS_UA[viewMonth] + ' ' + viewYear;
  document.getElementById('listTitle').textContent = 'Заходи — ' + MONTHS_UA[viewMonth];

  // Events list
  var listEl = document.getElementById('eventsList');
  if (events.length) {
    listEl.innerHTML = events.map(function(e) {
      var d = new Date(e.start_date);
      var statusColors = { registration_open:'var(--success)', upcoming:'var(--info)', ongoing:'var(--primary)', completed:'var(--text-muted)', cancelled:'var(--error)' };
      var color = statusColors[e.status] || 'var(--primary)';
      return '<a class="event-list-item" href="/events/' + e.slug + '" style="border-left-color:' + color + '">' +
        '<div class="event-date-box"><div class="event-date-day">' + d.getDate() + '</div><div class="event-date-mon">' + MONTHS_UA[d.getMonth()].slice(0,3) + '</div></div>' +
        '<div style="flex:1"><div style="font-weight:700;font-size:.9rem;color:var(--text)">' + e.title + '</div>' +
        '<div style="font-size:.8rem;color:var(--text-muted);margin-top:.2rem">' + (e.discipline_name||'') + (e.location_city ? ' · '+e.location_city : '') + '</div>' +
        '<div style="margin-top:.3rem"><span class="badge status-' + e.status + '" style="font-size:.7rem">' + (STATUS_LABELS[e.status]||e.status) + '</span></div>' +
        '</div></a>';
    }).join('');
  } else {
    listEl.innerHTML = '<div class="empty-state" style="padding:2rem"><div class="empty-icon">&#128197;</div><h3 style="font-size:1rem">Немає заходів</h3></div>';
  }

  // Build calendar
  var grid = document.getElementById('calGrid');
  // Remove day cells (keep header cells)
  var cells = grid.querySelectorAll('.cal-cell');
  cells.forEach(function(c) { c.remove(); });

  var firstDay = new Date(viewYear, viewMonth, 1);
  var lastDay = new Date(viewYear, viewMonth + 1, 0);
  var startDow = (firstDay.getDay() + 6) % 7; // Mon=0

  // Build event map
  var eventMap = {};
  events.forEach(function(e) {
    var d = new Date(e.start_date);
    if (d.getFullYear() === viewYear && d.getMonth() === viewMonth) {
      var key = d.getDate();
      if (!eventMap[key]) eventMap[key] = [];
      eventMap[key].push(e);
    }
  });

  var today = new Date();
  var totalCells = Math.ceil((startDow + lastDay.getDate()) / 7) * 7;
  for (var i = 0; i < totalCells; i++) {
    var dayNum = i - startDow + 1;
    var cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (dayNum < 1 || dayNum > lastDay.getDate()) {
      cell.classList.add('other-month');
      cell.innerHTML = '<span class="cal-day-num">' + (dayNum < 1 ? new Date(viewYear, viewMonth, dayNum).getDate() : dayNum - lastDay.getDate()) + '</span>';
    } else {
      var isToday = dayNum === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
      if (isToday) cell.classList.add('today');
      var numSpan = '<span class="cal-day-num">' + dayNum + '</span>';
      var dots = '';
      if (eventMap[dayNum]) {
        eventMap[dayNum].slice(0, 3).forEach(function(e) {
          dots += '<a href="/events/' + e.slug + '" class="cal-event-dot" style="background:rgba(230,57,70,.15);color:var(--primary)" title="' + e.title + '">' + e.title + '</a>';
        });
      }
      cell.innerHTML = numSpan + dots;
    }
    grid.appendChild(cell);
  }
}

async function loadCalendar() {
  document.getElementById('calTitle').textContent = 'Завантаження...';
  document.getElementById('eventsList').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  try {
    var data = await API.get('/calendar?year=' + viewYear + '&month=' + (viewMonth + 1));
    renderCalendar(data);
  } catch(e) {
    document.getElementById('eventsList').innerHTML = '<div class="empty-state"><div class="empty-icon">&#10060;</div><h3>Помилка</h3></div>';
  }
}

// Responsive layout
if (window.innerWidth < 900) {
  var layout = document.getElementById('calLayout');
  if (layout) layout.style.gridTemplateColumns = '1fr';
}

loadCalendar();
</script>
</body>
</html>
