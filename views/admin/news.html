<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новини | Адмін | СпортUA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="/" class="logo" style="font-size:1.1rem"><div class="logo-icon" style="width:28px;height:28px;font-size:.85rem">&#9889;</div>Спорт<span>UA</span></a>
      <button id="sidebarClose" style="background:none;border:none;color:var(--text-muted);cursor:pointer">&#10005;</button>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Головне</span>
      <a href="/admin" class="sidebar-link"><span class="icon"><i class="fa-solid fa-gauge"></i></span> Дашборд</a>
      <a href="/admin/profile" class="sidebar-link"><span class="icon"><i class="fa-solid fa-user"></i></span> Мій профіль</a>
      <span class="nav-section-label">Управління</span>
      <a href="/admin/events" class="sidebar-link"><span class="icon"><i class="fa-solid fa-trophy"></i></span> Заходи</a>
      <a href="/admin/users" class="sidebar-link"><span class="icon"><i class="fa-solid fa-users"></i></span> Користувачі</a>
      <a href="/admin/registrations" class="sidebar-link"><span class="icon"><i class="fa-solid fa-list-check"></i></span> Реєстрації</a>
      <a href="/admin/results" class="sidebar-link"><span class="icon"><i class="fa-solid fa-medal"></i></span> Результати</a>
      <span class="nav-section-label">Контент</span>
      <a href="/admin/news" class="sidebar-link active"><span class="icon"><i class="fa-solid fa-newspaper"></i></span> Новини</a>
      <a href="/admin/media" class="sidebar-link"><span class="icon"><i class="fa-solid fa-images"></i></span> Медіа</a>
      <span class="nav-section-label">Аналітика</span>
      <a href="/admin/reports" class="sidebar-link"><span class="icon"><i class="fa-solid fa-chart-bar"></i></span> Звіти</a>
      <a href="/admin/contacts" class="sidebar-link"><span class="icon"><i class="fa-solid fa-envelope"></i></span> Повідомлення</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="cabinet-avatar-placeholder" style="width:36px;height:36px;font-size:.75rem;border:2px solid var(--primary)" id="adminAvatarPh">A</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="adminName">Адмін</div><div class="sidebar-user-role">Адміністратор</div></div>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem">
        <a href="/" class="btn btn-ghost btn-sm" style="flex:1"><i class="fa-solid fa-globe"></i></a>
        <button id="logoutBtn" class="btn btn-ghost btn-sm" style="flex:1;color:var(--error)"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
        <div class="breadcrumb"><a href="/admin" style="color:var(--text-muted)">Адмін</a> / <span>Новини</span></div>
      </div>
      <div class="topbar-right"></div>
    </div>

    <div class="admin-content">
      <div class="page-title">
        <h1>Управління новинами</h1>
        <div class="page-title-actions">
          <button class="btn btn-primary" onclick="openCreateModal()"><i class="fa-solid fa-plus"></i> Нова стаття</button>
        </div>
      </div>

      <div class="data-table-header">
        <div class="data-table-search">
          <input type="text" id="searchInput" placeholder="Пошук статей..." oninput="debounceSearch()">
          <button onclick="loadNews()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div class="table-actions">
          <select class="form-control" id="statusFilter" onchange="loadNews()" style="padding:.45rem .875rem;font-size:.875rem">
            <option value="">Всі</option>
            <option value="published">Опубліковані</option>
            <option value="draft">Чернетки</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper" id="newsTableWrap">
        <div class="loader"><div class="spinner"></div></div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<!-- Create/Edit Modal -->
<div id="newsModal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3 id="modalTitle">Нова стаття</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="newsForm" enctype="multipart/form-data">
        <input type="hidden" id="newsId">
        <div class="form-group">
          <label class="form-label">Заголовок <span class="required">*</span></label>
          <input class="form-control" type="text" id="nTitle" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Категорія</label>
            <select class="form-control" id="nCategory">
              <option value="general">Загальне</option>
              <option value="announcement">Анонс</option>
              <option value="result">Результати</option>
              <option value="interview">Інтерв'ю</option>
              <option value="press">Прес-реліз</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Статус</label>
            <select class="form-control" id="nStatus">
              <option value="draft">Чернетка</option>
              <option value="published">Опублікувати</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Анонс (короткий опис)</label>
          <textarea class="form-control" id="nExcerpt" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Повний текст <span class="required">*</span></label>
          <textarea class="form-control" id="nContent" rows="8" required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Обкладинка</label>
          <input class="form-control" type="file" id="nCover" accept="image/*">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Скасувати</button>
      <button class="btn btn-primary" onclick="saveNews()" id="saveNewsBtn"><i class="fa-solid fa-floppy-disk"></i> Зберегти</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
if (!requireAdminAuth()) throw new Error('Unauthorized');

var currentPage = 1;
var searchTimer;

function toggleSidebar() {
  if (window.innerWidth > 1024) {
    document.getElementById('sidebar').classList.toggle('collapsed');
    var m = document.querySelector('.admin-main');
    if (m) m.classList.toggle('expanded');
  } else {
    document.getElementById('sidebar').classList.toggle('mobile-open');
    document.getElementById('sidebarOverlay').classList.toggle('visible');
  }
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { currentPage = 1; loadNews(); }, 400);
}

function closeModal() { document.getElementById('newsModal').style.display = 'none'; }

function openCreateModal() {
  document.getElementById('modalTitle').textContent = 'Нова стаття';
  document.getElementById('newsId').value = '';
  document.getElementById('newsForm').reset();
  document.getElementById('newsModal').style.display = 'flex';
}

function openEditModal(article) {
  document.getElementById('modalTitle').textContent = 'Редагувати статтю';
  document.getElementById('newsId').value = article.id;
  document.getElementById('nTitle').value   = article.title || '';
  document.getElementById('nCategory').value= article.category || 'general';
  document.getElementById('nStatus').value  = article.status || 'draft';
  document.getElementById('nExcerpt').value = article.excerpt || '';
  document.getElementById('nContent').value = article.content || '';
  document.getElementById('newsModal').style.display = 'flex';
}

async function saveNews() {
  var id = document.getElementById('newsId').value;
  var btn = document.getElementById('saveNewsBtn');
  btn.disabled = true;

  try {
    var formData = new FormData();
    formData.append('title',    document.getElementById('nTitle').value.trim());
    formData.append('category', document.getElementById('nCategory').value);
    formData.append('status',   document.getElementById('nStatus').value);
    formData.append('excerpt',  document.getElementById('nExcerpt').value.trim());
    formData.append('content',  document.getElementById('nContent').value.trim());
    var coverFile = document.getElementById('nCover').files[0];
    if (coverFile) formData.append('cover_image', coverFile);

    var headers = { 'Authorization': 'Bearer ' + Auth.getToken() };
    var url = '/api/admin/news' + (id ? '/' + id : '');
    var method = id ? 'PUT' : 'POST';
    var res = await fetch(url, { method, headers, body: formData });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error);

    showToast(id ? 'Статтю оновлено!' : 'Статтю створено!', 'success');
    closeModal();
    loadNews();
  } catch(err) {
    showToast(err.message || 'Помилка', 'error');
  } finally {
    btn.disabled = false;
  }
}

async function deleteNews(id) {
  if (!confirm('Видалити статтю?')) return;
  try {
    await API.delete('/admin/news/' + id, true);
    showToast('Статтю видалено', 'success');
    loadNews();
  } catch(e) { showToast(e.message, 'error'); }
}

async function loadNews() {
  var search = document.getElementById('searchInput').value.trim();
  var status = document.getElementById('statusFilter').value;
  var wrap = document.getElementById('newsTableWrap');
  wrap.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  try {
    var params = '?page=' + currentPage + '&limit=15';
    if (search) params += '&search=' + encodeURIComponent(search);
    if (status) params += '&status=' + status;

    var data = await API.get('/admin/news' + params, true);
    var articles = data.news || data.data || data;
    var total = data.total || articles.length;
    var totalPages = data.totalPages || Math.ceil(total / 15);

    if (!articles.length) {
      wrap.innerHTML = '<div class="empty-state" style="padding:3rem"><div class="empty-icon">&#128240;</div><h3>Статей не знайдено</h3></div>';
      return;
    }

    wrap.innerHTML = '<table class="table"><thead><tr>' +
      '<th>Заголовок</th><th>Категорія</th><th>Статус</th><th>Дата</th><th>Дії</th>' +
    '</tr></thead><tbody>' +
    articles.map(function(n) {
      return '<tr>' +
        '<td><div style="font-weight:600;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + n.title + '</div></td>' +
        '<td>' + (NEWS_CATEGORIES[n.category]||n.category) + '</td>' +
        '<td>' + (n.status === 'published' ? '<span class="badge badge-success">Опублікована</span>' : '<span class="badge badge-muted">Чернетка</span>') + '</td>' +
        '<td style="white-space:nowrap;color:var(--text-muted)">' + formatDate(n.published_at || n.created_at) + '</td>' +
        '<td><div style="display:flex;gap:.4rem">' +
          (n.slug ? '<a href="/news/' + n.slug + '" class="btn btn-ghost btn-sm" target="_blank"><i class="fa-solid fa-eye"></i></a>' : '') +
          '<button class="btn btn-outline btn-sm" onclick="openEditModal(' + JSON.stringify(n).replace(/"/g,'&quot;') + ')"><i class="fa-solid fa-pen"></i></button>' +
          '<button class="btn btn-danger btn-sm" onclick="deleteNews(' + n.id + ')"><i class="fa-solid fa-trash"></i></button>' +
        '</div></td>' +
      '</tr>';
    }).join('') + '</tbody></table>';

    var pag = document.getElementById('pagination');
    pag.innerHTML = '';
    for (var i = 1; i <= Math.min(totalPages, 10); i++) {
      (function(page) {
        var btn = document.createElement('button');
        btn.className = 'page-btn' + (page === currentPage ? ' active' : '');
        btn.textContent = page;
        btn.onclick = function() { currentPage = page; loadNews(); };
        pag.appendChild(btn);
      })(i);
    }
  } catch(err) {
    wrap.innerHTML = '<div class="empty-state" style="padding:2rem"><div class="empty-icon">&#10060;</div><h3>Помилка</h3></div>';
  }
}

(function() {
  var user = Auth.getUser();
  if (user) {
    document.getElementById('adminAvatarPh').textContent = (((user.first_name||'')[0]||'') + ((user.last_name||'')[0]||'')).toUpperCase();
    document.getElementById('adminName').textContent = [user.first_name, user.last_name].filter(Boolean).join(' ');
  }
})();

loadNews();
document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
document.getElementById('sidebarClose').addEventListener('click', toggleSidebar);
document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
document.getElementById('logoutBtn').addEventListener('click', function() { Auth.logout(); });
</script>
</body>
</html>
