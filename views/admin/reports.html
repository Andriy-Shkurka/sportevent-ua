<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Звіти | Адмін | СпортUA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    .report-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; margin-bottom:1.5rem; }
    .report-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; }
    .report-card-header { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; }
    .report-card-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
    .report-card-title { font-weight:700; font-size:1rem; }
    .report-metric { display:flex; justify-content:space-between; align-items:center; padding:.5rem 0; border-bottom:1px solid var(--border); font-size:.875rem; }
    .report-metric:last-child { border-bottom:none; }
    .report-metric-value { font-weight:700; color:var(--primary); }
    .chart-bar-wrap { margin-top:.75rem; }
    .chart-bar-row { display:flex; align-items:center; gap:.75rem; margin-bottom:.5rem; font-size:.8rem; }
    .chart-bar-label { width:110px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
    .chart-bar-track { flex:1; height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .chart-bar-fill { height:100%; border-radius:4px; background:var(--primary); transition:width .6s; }
    .chart-bar-count { width:30px; text-align:right; font-weight:600; color:var(--text-muted); }
    .section-title { font-size:1.1rem; font-weight:700; margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; }
    .period-tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .period-tab { padding:.5rem 1rem; border-radius:8px; border:1px solid var(--border); background:none; color:var(--text-muted); cursor:pointer; font-size:.875rem; transition:all .2s; }
    .period-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }
  </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="/" class="logo" style="font-size:1.1rem"><div class="logo-icon" style="width:28px;height:28px;font-size:.85rem">&#9889;</div>Спорт<span>UA</span></a>
      <button id="sidebarClose" style="background:none;border:none;color:var(--text-muted);cursor:pointer">&#10005;</button>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Головне</span>
      <a href="/admin" class="sidebar-link"><span class="icon"><i class="fa-solid fa-gauge"></i></span> Дашборд</a>
      <a href="/admin/profile" class="sidebar-link"><span class="icon"><i class="fa-solid fa-user"></i></span> Мій профіль</a>
      <span class="nav-section-label">Управління</span>
      <a href="/admin/events" class="sidebar-link"><span class="icon"><i class="fa-solid fa-trophy"></i></span> Заходи</a>
      <a href="/admin/users" class="sidebar-link"><span class="icon"><i class="fa-solid fa-users"></i></span> Користувачі</a>
      <a href="/admin/registrations" class="sidebar-link"><span class="icon"><i class="fa-solid fa-list-check"></i></span> Реєстрації</a>
      <a href="/admin/results" class="sidebar-link"><span class="icon"><i class="fa-solid fa-medal"></i></span> Результати</a>
      <span class="nav-section-label">Контент</span>
      <a href="/admin/news" class="sidebar-link"><span class="icon"><i class="fa-solid fa-newspaper"></i></span> Новини</a>
      <a href="/admin/media" class="sidebar-link"><span class="icon"><i class="fa-solid fa-images"></i></span> Медіа</a>
      <span class="nav-section-label">Аналітика</span>
      <a href="/admin/reports" class="sidebar-link active"><span class="icon"><i class="fa-solid fa-chart-bar"></i></span> Звіти</a>
      <a href="/admin/contacts" class="sidebar-link"><span class="icon"><i class="fa-solid fa-envelope"></i></span> Повідомлення</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="cabinet-avatar-placeholder" style="width:36px;height:36px;font-size:.75rem;border:2px solid var(--primary)" id="adminAvatarPh">A</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name" id="adminName">Адмін</div><div class="sidebar-user-role">Адміністратор</div></div>
      </div>
      <div style="display:flex;gap:.5rem;margin-top:.75rem">
        <a href="/" class="btn btn-ghost btn-sm" style="flex:1"><i class="fa-solid fa-globe"></i></a>
        <button id="logoutBtn" class="btn btn-ghost btn-sm" style="flex:1;color:var(--error)"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="topbar-left">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
        <div class="breadcrumb"><a href="/admin" style="color:var(--text-muted)">Адмін</a> / <span>Звіти</span></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-outline btn-sm" onclick="loadReports()"><i class="fa-solid fa-rotate-right"></i> Оновити</button>
      </div>
    </div>

    <div class="admin-content">
      <div class="page-title">
        <h1>Аналітика та звіти</h1>
      </div>

      <div class="period-tabs">
        <button class="period-tab active" onclick="setPeriod('month', this)">Цей місяць</button>
        <button class="period-tab" onclick="setPeriod('quarter', this)">Квартал</button>
        <button class="period-tab" onclick="setPeriod('year', this)">Рік</button>
        <button class="period-tab" onclick="setPeriod('all', this)">Весь час</button>
      </div>

      <div id="reportContent">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
if (!requireAdminAuth()) throw new Error('Unauthorized');

var currentPeriod = 'month';

function toggleSidebar() {
  if (window.innerWidth > 1024) {
    document.getElementById('sidebar').classList.toggle('collapsed');
    var m = document.querySelector('.admin-main');
    if (m) m.classList.toggle('expanded');
  } else {
    document.getElementById('sidebar').classList.toggle('mobile-open');
    document.getElementById('sidebarOverlay').classList.toggle('visible');
  }
}

function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  loadReports();
}

function barChart(items, labelKey, valueKey, maxVal) {
  if (!items || !items.length) return '<p style="color:var(--text-muted);font-size:.875rem">Немає даних</p>';
  var max = maxVal || Math.max.apply(null, items.map(function(i) { return i[valueKey] || 0; })) || 1;
  return '<div class="chart-bar-wrap">' +
    items.map(function(item) {
      var pct = Math.round((item[valueKey] || 0) / max * 100);
      return '<div class="chart-bar-row">' +
        '<div class="chart-bar-label" title="' + (item[labelKey]||'') + '">' + (item[labelKey]||'—') + '</div>' +
        '<div class="chart-bar-track"><div class="chart-bar-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="chart-bar-count">' + (item[valueKey]||0) + '</div>' +
      '</div>';
    }).join('') + '</div>';
}

function statCard(icon, color, title, metrics) {
  return '<div class="report-card">' +
    '<div class="report-card-header">' +
      '<div class="report-card-icon" style="background:' + color + '22;color:' + color + '">' +
        '<i class="fa-solid ' + icon + '"></i>' +
      '</div>' +
      '<div class="report-card-title">' + title + '</div>' +
    '</div>' +
    metrics.map(function(m) {
      return '<div class="report-metric"><span>' + m.label + '</span><span class="report-metric-value">' + m.value + '</span></div>';
    }).join('') +
  '</div>';
}

async function loadReports() {
  var cont = document.getElementById('reportContent');
  cont.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  try {
    var data = await API.get('/admin/reports?period=' + currentPeriod, true);

    var stats   = data.stats || {};
    var byDisc  = data.byDiscipline || [];
    var byMonth = data.byMonth || [];
    var topUsers = data.topUsers || [];
    var regStats = data.registrations || {};
    var newsStats = data.news || {};

    cont.innerHTML =
      // Row 1: Key metrics
      '<div class="report-grid">' +
        statCard('trophy', '#E63946', 'Заходи', [
          { label: 'Всього заходів', value: stats.total_events || 0 },
          { label: 'Активних', value: stats.active_events || 0 },
          { label: 'Завершених', value: stats.finished_events || 0 },
          { label: 'Учасників загалом', value: stats.total_participants || 0 }
        ]) +
        statCard('users', '#3A86FF', 'Користувачі', [
          { label: 'Всього зареєстровано', value: stats.total_users || 0 },
          { label: 'Нових за період', value: stats.new_users || 0 },
          { label: 'Активних', value: stats.active_users || 0 },
          { label: 'Заблокованих', value: stats.blocked_users || 0 }
        ]) +
        statCard('list-check', '#06D6A0', 'Реєстрації', [
          { label: 'Всього заявок', value: regStats.total || 0 },
          { label: 'Підтверджених', value: regStats.approved || 0 },
          { label: 'Очікують', value: regStats.pending || 0 },
          { label: 'Відхилених', value: regStats.rejected || 0 }
        ]) +
        statCard('newspaper', '#FF9F1C', 'Контент', [
          { label: 'Опублікованих статей', value: newsStats.published || 0 },
          { label: 'Чернеток', value: newsStats.draft || 0 },
          { label: 'Фото в галереї', value: stats.media_count || 0 },
          { label: 'Повідомлень', value: stats.contacts_count || 0 }
        ]) +
      '</div>' +

      // Row 2: Charts
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">' +
        '<div class="report-card">' +
          '<div class="section-title"><i class="fa-solid fa-dumbbell" style="color:var(--primary)"></i> Заходи за дисциплінами</div>' +
          barChart(byDisc, 'discipline_name', 'event_count') +
        '</div>' +
        '<div class="report-card">' +
          '<div class="section-title"><i class="fa-solid fa-crown" style="color:#FFD700"></i> Топ учасники (за балами)</div>' +
          (topUsers.length ? '<div class="table-wrapper" style="max-height:220px;overflow-y:auto"><table class="table" style="font-size:.85rem"><thead><tr><th>#</th><th>Учасник</th><th>Балів</th><th>Місць</th></tr></thead><tbody>' +
            topUsers.map(function(u, i) {
              var medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
              return '<tr><td>' + medal + '</td><td><strong>' + (u.first_name||'') + ' ' + (u.last_name||'') + '</strong><div style="font-size:.75rem;color:var(--text-muted)">' + (u.city||'') + '</div></td>' +
                '<td><span class="badge badge-primary">' + (u.total_points||0) + '</span></td>' +
                '<td style="color:var(--text-muted)">' + (u.result_count||0) + '</td></tr>';
            }).join('') + '</tbody></table></div>'
          : '<p style="color:var(--text-muted);font-size:.875rem">Немає даних</p>') +
        '</div>' +
      '</div>' +

      // Row 3: Monthly chart
      '<div class="report-card" style="margin-bottom:1.5rem">' +
        '<div class="section-title"><i class="fa-solid fa-chart-line" style="color:var(--primary)"></i> Реєстрації по місяцях</div>' +
        (byMonth.length ?
          '<div style="overflow-x:auto">' +
          '<div style="display:flex;align-items:flex-end;gap:.5rem;min-width:400px;height:120px;padding:.5rem 0">' +
          (function() {
            var maxV = Math.max.apply(null, byMonth.map(function(m) { return m.count || 0; })) || 1;
            return byMonth.map(function(m) {
              var h = Math.max(4, Math.round((m.count||0)/maxV*100));
              return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem">' +
                '<div style="font-size:.7rem;color:var(--text-muted)">' + (m.count||0) + '</div>' +
                '<div style="width:100%;height:' + h + '%;background:var(--primary);border-radius:4px 4px 0 0;opacity:.85;min-height:4px"></div>' +
                '<div style="font-size:.7rem;color:var(--text-muted);white-space:nowrap">' + (m.month_label||m.month||'') + '</div>' +
              '</div>';
            }).join('');
          })() +
          '</div></div>'
          : '<p style="color:var(--text-muted);font-size:.875rem">Немає даних за вибраний період</p>') +
      '</div>' +

      // Row 4: Registrations by event
      (data.topEvents && data.topEvents.length ?
      '<div class="report-card">' +
        '<div class="section-title"><i class="fa-solid fa-ranking-star" style="color:var(--primary)"></i> Популярні заходи</div>' +
        barChart(data.topEvents, 'title', 'reg_count') +
      '</div>' : '');

  } catch(err) {
    cont.innerHTML = '<div class="empty-state" style="padding:3rem"><div class="empty-icon">&#10060;</div><h3>Помилка завантаження звітів</h3><p>' + (err.message||'') + '</p></div>';
  }
}

(function() {
  var user = Auth.getUser();
  if (user) {
    document.getElementById('adminAvatarPh').textContent = (((user.first_name||'')[0]||'') + ((user.last_name||'')[0]||'')).toUpperCase();
    document.getElementById('adminName').textContent = [user.first_name, user.last_name].filter(Boolean).join(' ');
  }
})();

loadReports();
document.getElementById('sidebarOverlay').addEventListener('click', toggleSidebar);
document.getElementById('sidebarClose').addEventListener('click', toggleSidebar);
document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
document.getElementById('logoutBtn').addEventListener('click', function() { Auth.logout(); });
</script>
</body>
</html>
