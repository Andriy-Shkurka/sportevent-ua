services:
  - type: web
    name: sportevent-ua
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sportevent-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        value: https://sportevent-ua.onrender.com

databases:
  - name: sportevent-db
    plan: free
    databaseName: sports_events
    user: sportevent
